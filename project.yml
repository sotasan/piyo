name: Piyo
options:
  bundleIdPrefix: sh.piyo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  libghostty-spm:
    url: https://github.com/Lakr233/libghostty-spm.git
    from: "1.2.0"

targets:
  Piyo:
    type: application
    platform: macOS
    sources:
      - path: Piyo
      # zmx binary (built by scripts/build-zmx.sh) -> Contents/Resources/bin
      - path: Resources/bin
        type: folder
        buildPhase: resources
      # ghostty shell-integration from the submodule -> Contents/Resources/shell-integration
      - path: vendor/ghostty/src/shell-integration
        type: folder
        buildPhase: resources
    dependencies:
      - package: libghostty-spm
        product: GhosttyTerminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.piyo
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
