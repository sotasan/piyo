name: Piyo
options:
    bundleIdPrefix: sh.piyo
    deploymentTarget:
        macOS: "26.0"
    createIntermediateGroups: true
    developmentLanguage: en

packages:
    libghostty-spm:
        url: https://github.com/Lakr233/libghostty-spm.git
        from: "1.2.8"
    Sparkle:
        url: https://github.com/sparkle-project/Sparkle.git
        from: "2.6.0"

targets:
    Piyo:
        type: application
        platform: macOS
        sources:
            - path: apps/desktop/Sources
            # Rust core -> Swift API (generated by the "UniFFI Swift bindings" pre-build script).
            # optional: the file is produced at build time; xcodegen still adds it to Compile Sources.
            - path: target/uniffi-swift/piyo.swift
              optional: true
            # zmx binary (built by `just zmx`) -> Contents/Resources/bin
            - path: Resources/bin
              type: folder
              buildPhase: resources
            # ghostty shell-integration from the submodule -> Contents/Resources/shell-integration
            - path: vendor/ghostty/src/shell-integration
              type: folder
              buildPhase: resources
        preBuildScripts:
            # Build the Rust core (libpiyo.a) and (re)generate its UniFFI Swift bindings
            # into target/uniffi-swift/ before the Swift sources are compiled. Runs every
            # build; cargo's own up-to-date check makes the no-op case fast.
            - name: UniFFI Swift bindings
              basedOnDependencyAnalysis: false
              shell: /bin/sh
              # Declaring the generated files as outputs lets Xcode's build system sequence
              # this phase before Compile Sources (otherwise piyo.swift is "input not found").
              inputFiles:
                  - $(SRCROOT)/crates/core/Cargo.toml
                  - $(SRCROOT)/crates/core/src/lib.rs
              outputFiles:
                  - $(SRCROOT)/target/uniffi-swift/piyo.swift
                  - $(SRCROOT)/target/uniffi-swift/piyoFFI.h
                  - $(SRCROOT)/target/uniffi-swift/module.modulemap
              script: |
                  set -eu
                  export PATH="$HOME/.cargo/bin:$PATH"
                  cd "$SRCROOT"
                  cargo build --release
                  # One call emits piyo.swift + piyoFFI.h + module.modulemap. module-name MUST be
                  # piyoFFI to match the generated `import piyoFFI`; filename module.modulemap so the
                  # Clang importer finds it via SWIFT_INCLUDE_PATHS.
                  target/release/uniffi-bindgen-swift target/release/libpiyo.a target/uniffi-swift --swift-sources --headers --modulemap --module-name piyoFFI --modulemap-filename module.modulemap
        dependencies:
            - package: libghostty-spm
              product: GhosttyTerminal
            - package: Sparkle
              product: Sparkle
        settings:
            base:
                # arm64 only: the Rust pre-build runs `cargo build --release`, which
                # builds the host arch alone — a universal (Release default) link fails
                # on the arm64-only libpiyo.a. For an Intel/universal build, make the
                # cargo step lipo both targets instead.
                ARCHS: arm64
                PRODUCT_BUNDLE_IDENTIFIER: sh.piyo
                MARKETING_VERSION: "0.1.0"
                CURRENT_PROJECT_VERSION: "1"
                SWIFT_VERSION: "6.0"
                CODE_SIGN_IDENTITY: "-"
                CODE_SIGN_STYLE: Manual
                ENABLE_HARDENED_RUNTIME: NO
                GENERATE_INFOPLIST_FILE: YES
                ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
                # Sparkle reads appcast.xml off whichever release is newest: the /latest/
                # path 302-redirects to that release's asset, so GitHub Releases host the
                # feed AND the zips — no separate server. SUPublicEDKey must match the
                # private key in CI: paste the public key from Sparkle's `generate_keys`.
                INFOPLIST_KEY_SUFeedURL: https://github.com/sotasan/piyo/releases/latest/download/appcast.xml
                INFOPLIST_KEY_SUPublicEDKey: REPLACE_WITH_GENERATED_ED_PUBLIC_KEY
                # Find the generated piyoFFI modulemap/header and link the Rust staticlib
                SWIFT_INCLUDE_PATHS: $(SRCROOT)/target/uniffi-swift
                LIBRARY_SEARCH_PATHS:
                    - $(inherited)
                    - $(SRCROOT)/target/release
                OTHER_LDFLAGS:
                    - $(inherited)
                    - -lpiyo

schemes:
    Piyo:
        build:
            targets:
                Piyo: all
        run:
            config: Debug
