[settings]
# Required for the postinstall hook below.
experimental = true

[tools]
"aqua:quarylabs/sqruff" = "latest"
bun = "latest"
# sqlite-only, bundled SQLite — so cloning doesn't build the Postgres/MySQL
# drivers. Used for migrations + regenerating src/schema.rs (migrations are truth).
"cargo:diesel_cli" = { version = "2.3.10", default-features = false, features = "sqlite-bundled" }
rust = "stable"
swiftformat = "latest"
# Tasks live in the justfile; vendir fetches vendored deps, just runs the graph.
"aqua:carvel-dev/vendir" = "latest"
"aqua:casey/just" = "latest"
swiftlint = "latest"
xcodegen = "latest"
zig = "0.15.2"

# Loads .env (DEVELOPER_DIR — the Xcode ≤26.2 SDK pin) into the shell, so a
# terminal `xcodebuild` links the right SDK. just's dotenv-load only reaches
# recipe processes, not your shell/Xcode, so this stays in mise.
[env]
_.file = ".env"

# After the toolchain installs, pull JS deps + vendored source (ghostty
# shell-integration + zmx) so a fresh clone is `mise install && just`. Fires on
# every `mise install`, so it doubles as the re-sync after editing vendir.yml.
[hooks]
postinstall = ["bun install", "vendir sync"]
