name: Release

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        name: Build & release
        runs-on: macos-26
        outputs:
            tag: ${{ steps.tag.outputs.value }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin

            - name: Cache Cargo registry & target
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install frontend dependencies
              run: bun install --frozen-lockfile

            - name: Resolve release tag
              id: tag
              run: |
                  version=$(awk -F\" '/^version/ {print $2; exit}' src-tauri/Cargo.toml)
                  echo "value=v${version}" >> "$GITHUB_OUTPUT"

            - name: Build & release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ steps.tag.outputs.value }}
                  releaseName: "Piyo ${{ steps.tag.outputs.value }}"
                  releaseDraft: false
                  prerelease: false
                  includeUpdaterJson: true
                  args: --target aarch64-apple-darwin --bundles app,dmg

    homebrew:
        name: Bump Homebrew cask
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Bump cask
              env:
                  GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  TAG: ${{ needs.release.outputs.tag }}
              run: |
                  set -euo pipefail
                  VERSION="${TAG#v}"
                  DMG_URL="https://github.com/sotasan/piyo/releases/download/${TAG}/Piyo_${VERSION}_aarch64.dmg"
                  SHA=$(curl -fsSL "$DMG_URL" | sha256sum | awk '{print $1}')

                  git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/sotasan/homebrew-tap.git" tap
                  cd tap
                  sed -i -E "s/^  version \"[^\"]+\"/  version \"${VERSION}\"/" Casks/piyo.rb
                  sed -i -E "s/^  sha256 \"[^\"]+\"/  sha256 \"${SHA}\"/" Casks/piyo.rb
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Casks/piyo.rb
                  git commit -m "piyo ${VERSION}"
                  git push
